<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark background -->
  <rect width="128" height="128" fill="#060408"/>
  <!-- Moon -->
  <circle cx="64" cy="28" r="18" fill="#c8a84a" opacity="0.85"/>
  <circle cx="71" cy="22" r="14" fill="#060408"/>
  <!-- Tree silhouette - trunk -->
  <rect x="60" y="72" width="8" height="30" fill="#1a1208"/>
  <rect x="57" y="88" width="14" height="4" fill="#1a1208"/>
  <!-- Tree silhouette - canopy layers -->
  <polygon points="64,38 44,72 84,72" fill="#0d1a06"/>
  <polygon points="64,48 46,78 82,78" fill="#0a1404"/>
  <polygon points="64,58 48,84 80,84" fill="#081002"/>
  <!-- Fog wisps near ground -->
  <ellipse cx="30" cy="110" rx="28" ry="6" fill="#2a3a5a" opacity="0.35"/>
  <ellipse cx="96" cy="114" rx="22" ry="5" fill="#2a3a5a" opacity="0.28"/>
  <ellipse cx="64" cy="118" rx="36" ry="7" fill="#1e2e4a" opacity="0.40"/>
  <!-- Firefly dots -->
  <circle cx="38" cy="90" r="1.2" fill="#44ff88" opacity="0.8"/>
  <circle cx="92" cy="82" r="1.0" fill="#44ff88" opacity="0.7"/>
  <circle cx="22" cy="78" r="0.9" fill="#66ffaa" opacity="0.6"/>
  <circle cx="108" cy="95" r="1.1" fill="#44ff88" opacity="0.75"/>
  <!-- Kanji 闇 (darkness) subtle watermark -->
  <text x="64" y="108" font-family="serif" font-size="11" fill="#c8a84a" opacity="0.55" text-anchor="middle">闇</text>
</svg>
