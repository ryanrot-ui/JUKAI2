# Netlify deployment for the PumpTrader WEB APP (dashboard + API + auth).
#
# IMPORTANT: Netlify hosts the web app only. The trading ENGINE is a
# long-running worker (persistent process, websockets) and cannot run on
# Netlify's serverless platform — run it on an always-on host (Render worker,
# Railway, Fly.io, a VPS) pointed at the SAME database. See
# docs/DEPLOY-NETLIFY.md.

[build]
  command = "node scripts/netlify-build.mjs"
  # publish dir is managed by the Next.js plugin below; do not set it manually.

[build.environment]
  # Prisma needs its native engine fetched at build time.
  PRISMA_CLIENT_ENGINE_TYPE = "library"
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# Official Next.js runtime: routes API handlers and SSR to Netlify Functions,
# serves static assets from the CDN. Handles publish/functions wiring itself.
[[plugins]]
  package = "@netlify/plugin-nextjs"
